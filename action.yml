name: 'Push Files to Repo'
description: '通过 Pull Request 将当前仓库的文件或文件夹推送到另一个仓库'
author: 'NEVSTOP-LAB'

branding:
  icon: 'upload-cloud'
  color: 'blue'

inputs:
  source_folder:
    description: >
      当前仓库中源文件或文件夹的路径，相对于仓库根目录。
    required: true

  destination_repo:
    description: >
      目标仓库，格式为 "owner/repo"。
    required: true

  destination_folder:
    description: >
      目标仓库中文件存放的路径，相对于仓库根目录。
    required: false
    default: '.'

  destination_base_branch:
    description: >
      目标仓库中创建 PR 所基于的基础分支。
    required: false
    default: 'main'

  destination_head_branch:
    description: >
      在目标仓库中为 PR 创建的分支名称。
      如果未指定，将自动生成唯一的分支名称。
    required: false
    default: ''

  token:
    description: >
      具有目标仓库 `repo` 权限的个人访问令牌（PAT）或 GitHub App Token。
      跨仓库操作必填。请将其保存为 Secret 并引用
      （例如 ${{ secrets.PAT }}）。
    required: true

  commit_message:
    description: >
      目标仓库中文件变更的提交信息。
    required: false
    default: 'chore: push files from source repository'

  pr_title:
    description: >
      在目标仓库中创建的 Pull Request 标题。
    required: false
    default: '[Automated] Push files from source repository'

  pr_body:
    description: >
      Pull Request 的正文/描述。
    required: false
    default: 'Automated PR created by [Push-Files-to-Repo](https://github.com/NEVSTOP-LAB/Push-Files-to-Repo) action.'

  git_user_name:
    description: >
      提交的 Git user.name。默认为 github-actions[bot]。
    required: false
    default: 'github-actions[bot]'

  git_user_email:
    description: >
      提交的 Git user.email。默认为 github-actions bot 邮箱。
    required: false
    default: '41898282+github-actions[bot]@users.noreply.github.com'

  cleanup:
    description: >
      如果设为 "true"，在复制新文件前删除目标文件夹中的所有已有文件。
      默认为 "false"（合并/覆盖）。
    required: false
    default: 'false'

  draft:
    description: >
      如果设为 "true"，创建草稿 Pull Request。
    required: false
    default: 'false'

outputs:
  pr_number:
    description: '创建的 Pull Request 编号'
    value: ${{ steps.create-pr.outputs.pr_number }}

  pr_url:
    description: '创建的 Pull Request URL'
    value: ${{ steps.create-pr.outputs.pr_url }}

runs:
  using: 'composite'
  steps:
    - name: Push files and create PR
      id: create-pr
      shell: bash
      env:
        INPUT_SOURCE_FOLDER: ${{ inputs.source_folder }}
        INPUT_DESTINATION_REPO: ${{ inputs.destination_repo }}
        INPUT_DESTINATION_FOLDER: ${{ inputs.destination_folder }}
        INPUT_DESTINATION_BASE_BRANCH: ${{ inputs.destination_base_branch }}
        INPUT_DESTINATION_HEAD_BRANCH: ${{ inputs.destination_head_branch }}
        INPUT_TOKEN: ${{ inputs.token }}
        INPUT_COMMIT_MESSAGE: ${{ inputs.commit_message }}
        INPUT_PR_TITLE: ${{ inputs.pr_title }}
        INPUT_PR_BODY: ${{ inputs.pr_body }}
        INPUT_GIT_USER_NAME: ${{ inputs.git_user_name }}
        INPUT_GIT_USER_EMAIL: ${{ inputs.git_user_email }}
        INPUT_CLEANUP: ${{ inputs.cleanup }}
        INPUT_DRAFT: ${{ inputs.draft }}
        GITHUB_ACTION_PATH: ${{ github.action_path }}
      run: bash "${GITHUB_ACTION_PATH}/entrypoint.sh"
